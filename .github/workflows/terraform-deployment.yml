name: Terraform Deployment

on:
  workflow_dispatch:
    inputs:
      module_version:
        description: "Azure Artifact Module Version"
        required: true
        default: "1.0.11"

      terraform_action:
        description: "Terraform action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read

env:
  ORGANIZATION: sumisharma900905
  PROJECT: kubeops
  FEED: kubeops-terraform-module
  PACKAGE_NAME: terraform-module

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure DevOps Extension
        run: |
          az extension add --name azure-devops --yes

      - name: Download Module From Azure Artifacts
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          mkdir -p artifact

          az artifacts universal download \
            --organization https://dev.azure.com/${{ env.ORGANIZATION }} \
            --scope project \
            --project ${{ env.PROJECT }} \
            --feed ${{ env.FEED }} \
            --name ${{ env.PACKAGE_NAME }} \
            --version ${{ github.event.inputs.module_version }} \
            --path artifact

      - name: Verify Download
        run: ls -R artifact

      - name: Extract Module
        run: |
          mkdir -p module
          unzip -o artifact/*.zip -d module

      - name: Verify Extraction
        run: find module -type f

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: IAC
        run: terraform init

      - name: Terraform Validate
        working-directory: IAC
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.terraform_action == 'plan'
        working-directory: IAC
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.terraform_action == 'apply'
        working-directory: IAC
        run: |
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan
