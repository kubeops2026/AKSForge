name: Connect to AKS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: AKS-Forge-RG
  AKS_CLUSTER: AKS-Forge
  ACR_NAME: aksforgeacr
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  aks-connect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      ########################################################
      # 1. Azure Login (OIDC)
      ########################################################
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      ########################################################
      # 2. Attach ACR to AKS (FIX for ImagePullBackOff)
      ########################################################
      # - name: Attach ACR to AKS
      #   run: |
      #     az aks update \
      #       --name $AKS_CLUSTER \
      #       --resource-group $RESOURCE_GROUP \
      #       --attach-acr $ACR_NAME

      ########################################################
      # 3. Install kubectl
      ########################################################
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      ########################################################
      # 4. Get AKS credentials
      ########################################################
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      ########################################################
      # 5. Verify cluster access
      ########################################################
      - name: Test cluster access
        run: |
          kubectl get nodes
          kubectl get pods -A
          kubectl get svc
